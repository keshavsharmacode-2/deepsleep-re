<svg xmlns="http://www.w3.org/2000/svg" width="158" height="52" viewBox="0 0 158 52">
  <defs>
    <style>
      .rd{font-family:'Courier New',Courier,monospace;font-size:21px;font-weight:bold;fill:#fff;}
      .lbl{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;font-weight:700;fill:#f1948a;letter-spacing:1.4px;text-transform:uppercase;}
      .rl0{animation:spin0 1.5s cubic-bezier(.17,.67,.28,1) 0.00s both;}@keyframes spin0{0%{transform:translateY(0)}100%{transform:translateY(-760px)}}
    </style>
    
  </defs>

  <!-- red background -->
  <rect width="158" height="52" rx="9" fill="#c0392b"/>
  <!-- darker number panel -->
  <rect x="118" width="40" height="52" rx="7" fill="#922b21"/>

  <!-- label -->
  <text x="12" y="21" class="lbl">total</text>
  <text x="12" y="36" class="lbl">downloads</text>

  <!-- clip paths -->
  <clipPath id="c0"><rect x="124" y="7" width="22" height="38"/></clipPath>

