name: Update Downloads Badge

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate badges
        run: |
          python scripts/gen_downloads_badge.py
          python scripts/gen_mascot_badge.py

      - name: Commit badges if changed
        run: |
          git config user.name  "Keshavsharma-code"
          git config user.email "270376336+Keshavsharma-code@users.noreply.github.com"
          git add assets/dl.svg assets/mascot-badge.svg
          git diff --staged --quiet && echo "No change" || \
            (git commit -m "chore: refresh downloads badges" && git push)
